name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: dmg
          - os: windows-latest
            rid: win-x64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ---------------- RESTORE ----------------
      - name: Restore (Windows)
        if: runner.os == 'Windows'
        run: dotnet restore JKACrossplatform.sln

      - name: Restore (Linux/macOS)
        if: runner.os != 'Windows'
        run: dotnet restore JKA_crossplatform.mac.slnf

# ---------------- PUBLISH ----------------
      - name: Build main app (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish JkaProtocolProxy.UI.Desktop\JkaProtocolProxy.UI.Desktop.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -o bin\PublishOutputs\win-x64\JkaProtocolProxy

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish Installer\Installer.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -o bin\PublishOutputs\win-x64\Installer

      - name: Publish (macOS)
        if: runner.os == 'macOS'
        run: |
          dotnet publish JKA_crossplatform.mac.slnf \
            -c Release -r osx-arm64 --self-contained true \
            -o bin/PublishOutputs/osx-arm64/JkaProtocolProxy

      - name: Publish (Linux)
        if: runner.os == 'Linux'
        run: |
          dotnet publish JKA_crossplatform.mac.slnf \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -o bin/PublishOutputs/${{ matrix.rid }}/JkaProtocolProxy

      # ---------------- PACKAGE ----------------
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cleanRef = $env:GITHUB_REF -replace '^refs/(tags|heads)/', ''

          if ($env:GITHUB_REF -notlike 'refs/tags/*') {
              $tag = "manual-$(Get-Date -Format yyyyMMddHHmmss)"
          } else {
              $tag = $cleanRef
          }

          $installer = Get-ChildItem bin\PublishOutputs\win-x64\Installer\*.exe | Select-Object -First 1

          if ($null -eq $installer) {
              Write-Error "Could not find any .exe installer in the publish outputs directory!"
              exit 1
          }

          Compress-Archive -Path $installer.FullName -DestinationPath "JKACrossplatform-$tag-win-x64.zip"
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tag=${GITHUB_REF##*/}
          if [ -z "$tag" ]; then
            tag=manual-$(date +%Y%m%d%H%M%S)
          fi

          # FIX: cd directly into the project's specific build output folder
          cd bin/PublishOutputs/${{ matrix.rid }}/JkaProtocolProxy
          tar -czf ../../../../../JKACrossplatform-${tag}-${{ matrix.rid }}.tar.gz *

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=bin/JKA_Proxy.app
          mkdir -p $APP/Contents/MacOS
          mkdir -p $APP/Contents/Resources

          # 1. Copy over the application build outputs
          cp -r bin/PublishOutputs/osx-arm64/JkaProtocolProxy/* $APP/Contents/MacOS/
          chmod +x $APP/Contents/MacOS/JKACrossplatform

          # 2. CONVERT ICON: Dynamically build an Apple .icns file from your root icon.ico
          # Create a temporary directory structure macOS iconutil expects
          mkdir -p bin/icon.iconset
          
          # Use macOS native 'sips' tool to extract standard dimensions out of the .ico
          sips -z 16 16   icon.ico --out bin/icon.iconset/icon_16x16.png
          sips -z 32 32   icon.ico --out bin/icon.iconset/icon_16x16@2x.png
          sips -z 32 32   icon.ico --out bin/icon.iconset/icon_32x32.png
          sips -z 64 64   icon.ico --out bin/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.ico --out bin/icon.iconset/icon_128x128.png
          sips -z 256 256 icon.ico --out bin/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.ico --out bin/icon.iconset/icon_256x256.png
          sips -z 512 512 icon.ico --out bin/icon.iconset/icon_256x256@2x.png
          
          # Compile the images into a single Apple .icns bundle inside Contents/Resources
          iconutil -c icns bin/icon.iconset -o $APP/Contents/Resources/icon.icns

          # 3. Create the Info.plist linking the newly built icon.icns
          cat > $APP/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>JKA Proxy</string>
            <key>CFBundleExecutable</key>
            <string>JKACrossplatform</string>
            # FIX: Explicitly tell macOS to use the compiled icon file
            <key>CFBundleIconFile</key>
            <string>icon.icns</string>
            <key>CFBundleIdentifier</key>
            <string>com.newagesoftware.jkaproxy</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Create .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          tag=${GITHUB_REF##*/}
          if [ -z "$tag" ]; then tag=manual-$(date +%Y%m%d%H%M%S); fi

          hdiutil create \
            -volname "JKA Proxy" \
            -srcfolder bin/JKACrossplatform.app \
            -ov -format UDZO \
            JKACrossplatform-${tag}-osx-arm64.dmg

      # Upload runs last so macOS finds its .dmg file
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JKACrossplatform-${{ matrix.rid }}
          path: JKACrossplatform-*.${{ matrix.ext }}

  # ---------------- RELEASE ----------------
  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Determine Tag Name
        id: get_tag
        shell: bash
        run: |
          # If it's a real tag, use it. If manual, generate a fallback tag name.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Explicitly pass the tag name so GitHub knows where to attach the files
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: ./dist/*