name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: dmg
          - os: windows-latest
            rid: win-x64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ---------------- RESTORE ----------------
      - name: Restore (Windows)
        if: runner.os == 'Windows'
        run: dotnet restore JKACrossplatform.sln

      - name: Restore (Linux/macOS)
        if: runner.os != 'Windows'
        run: dotnet restore JKA_crossplatform.mac.slnf

      # ---------------- PUBLISH ----------------
      - name: Build main app (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish JkaProtocolProxy.UI.Desktop\JkaProtocolProxy.UI.Desktop.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -o bin\PublishOutputs\win-x64\JkaProtocolProxy
      
      - name: Build uninstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet build Uninstaller\Uninstall.csproj `
            -c Release -r win-x86 `
            -o bin\PublishOutputs\win-x86\Uninstaller

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish Installer\Installer.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -o bin\PublishOutputs\win-x64\Installer

      - name: Publish (macOS)
        if: runner.os == 'macOS'
        run: |
          dotnet publish JKA_crossplatform.mac.slnf \
            -c Release -r osx-arm64 --self-contained true \
            -o bin/PublishOutputs/osx-arm64/JkaProtocolProxy

      - name: Publish (Linux)
        if: runner.os == 'Linux'
        run: |
          dotnet publish JKA_crossplatform.mac.slnf \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -o bin/PublishOutputs/${{ matrix.rid }}/JkaProtocolProxy

      # ---------------- PACKAGE ----------------
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cleanRef = $env:GITHUB_REF -replace '^refs/(tags|heads)/', ''
          if ($env:GITHUB_REF -notlike 'refs/tags/*') {
              $tag = "manual-$(Get-Date -Format yyyyMMddHHmmss)"
          } else {
              $tag = $cleanRef
          }
          $installer = Get-ChildItem bin\PublishOutputs\win-x64\Installer\*.exe | Select-Object -First 1
          if ($null -eq $installer) {
              Write-Error "Could not find any .exe installer in the publish outputs directory!"
              exit 1
          }
          Compress-Archive -Path $installer.FullName -DestinationPath "JKACrossplatform-$tag-win-x64.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tag=${GITHUB_REF##*/}
          if [ -z "$tag" ]; then
            tag=manual-$(date +%Y%m%d%H%M%S)
          fi
          cd bin/PublishOutputs/${{ matrix.rid }}/JkaProtocolProxy
          tar -czf "$GITHUB_WORKSPACE/JKACrossplatform-${tag}-${{ matrix.rid }}.tar.gz" *

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=bin/JKACrossplatform.app
          mkdir -p $APP/Contents/MacOS
          mkdir -p $APP/Contents/Resources

          cp -r bin/PublishOutputs/osx-arm64/JkaProtocolProxy/* $APP/Contents/MacOS/
          chmod +x $APP/Contents/MacOS/JKACrossplatform

          # CLEANUP: Purge loose metadata formats
          rm -f $APP/Contents/MacOS/*.pdb
          rm -f $APP/Contents/MacOS/*.deps.json
          rm -f $APP/Contents/MacOS/*.runtimeconfig.json
          rm -f $APP/Contents/MacOS/*.xml
          rm -f $APP/Contents/MacOS/*.config

          # CLEANUP: Remove non-macOS cross-platform library cruft that fails code validation
          rm -f $APP/Contents/MacOS/Avalonia.FreeDesktop*
          rm -f $APP/Contents/MacOS/Avalonia.X11*
          rm -f $APP/Contents/MacOS/Avalonia.Win32*

          if [ -f "icon.icns" ]; then
            cp icon.icns $APP/Contents/Resources/icon.icns
          else
            echo "Warning: icon.icns was not found in the root directory!"
          fi

          cat > $APP/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>JKACrossplatform</string>
            <key>CFBundleExecutable</key>
            <string>JKACrossplatform</string>
            <key>CFBundleIconFile</key>
            <string>icon.icns</string>
            <key>CFBundleIdentifier</key>
            <string>com.newagesoftware.jkacrossplatform</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

        # ---------------- MACOS CODESIGN & NOTARIZATION ----------------
      - name: Install Apple Certificate (macOS)
        if: runner.os == 'macOS'
        id: install_certs
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Code Sign App Bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH="bin/JKACrossplatform.app"
          ENTITLEMENTS="entitlements.plist"
          
          security default-keychain -s "${{ steps.install_certs.outputs.keychain-name }}"
          
          echo "Signing binaries, native dylibs, DLLs, and libraries inside the bundle..."
          find "$APP_PATH/Contents/MacOS" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" -o -not -name "*.*" \) -print0 | while IFS= read -r -d '' file; do
            echo "Signing $file"
            codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "9ELVK5QPKF" "$file"
          done

          echo "Performing a deep verification and signature on the main app bundle..."
          codesign --force --deep --options runtime --entitlements "$ENTITLEMENTS" --sign "9ELVK5QPKF" "$APP_PATH"

      - name: Create .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          tag=${GITHUB_REF##*/}
          if [ -z "$tag" ]; then tag=manual-$(date +%Y%m%d%H%M%S); fi

          hdiutil create \
            -volname "JKACrossplatform" \
            -srcfolder bin/JKACrossplatform.app \
            -ov -format UDZO \
            JKACrossplatform-${tag}-osx-arm64.dmg

      - name: Notarize DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          tag=${GITHUB_REF##*/}
          if [ -z "$tag" ]; then tag=manual-$(date +%Y%m%d%H%M%S); fi
          DMG_NAME="JKACrossplatform-${tag}-osx-arm64.dmg"

          echo "Submitting $DMG_NAME to Apple Notarization Service..."
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "9ELVK5QPKF" \
            --wait

          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG_NAME"

      # ---------------- UPLOAD ----------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JKACrossplatform-${{ matrix.rid }}
          path: JKACrossplatform-*.${{ matrix.ext }}

  # ---------------- RELEASE ----------------
  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Determine Tag Name
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: ./dist/*